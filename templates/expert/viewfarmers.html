{% include 'expert/expert_header.html' %}
<center>

<h1>View Farmers</h1>
    <table class="table" style="width: 500px;">
        <tr>
        <th>SlNo</th>
        <th>Farmer Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Dob</th>
        <th>Gender</th>
    </tr>
    {% for i in fa %}
    <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ i.first_name }}</td>
        <td>{{ i.email }}</td>
        <td>{{ i.phone }}</td>
        <td>{{ i.dob }}</td>
        <td>{{ i.gender }}</td>
        
    </tr>
    {% endfor %}
    </table>
</center>
